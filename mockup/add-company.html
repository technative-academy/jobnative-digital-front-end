<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobNative - Add Company Modal Mockup</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #561ce5;
      --primary-light: #7e57e1;
      --primary-dark: #3d0fa8;
      --secondary: #1939e0;
      --secondary-light: #6b80fa;
      --bg-white: #ffffff;
      --bg-light: #f8f9fc;
      --text-dark: #1a1a2e;
      --text-medium: #64748b;
      --text-light: #94a3b8;
      --border: #e2e8f0;
      --radius: 12px;
      --radius-lg: 16px;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: rgba(15, 10, 30, 0.6);
      color: var(--text-dark);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      -webkit-font-smoothing: antialiased;
    }

    .modal {
      background: var(--bg-white);
      border-radius: 20px;
      max-width: 560px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 24px 80px rgba(0,0,0,0.25);
    }

    /* HEADER */
    .modal-header {
      padding: 28px 32px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-header h2 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .btn-x {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: none;
      background: var(--bg-light);
      color: var(--text-light);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .btn-x:hover { background: var(--border); color: var(--text-dark); }

    .modal-subtitle {
      padding: 6px 32px 24px;
      font-size: 14px;
      color: var(--text-medium);
    }

    /* FORM */
    .form-body {
      padding: 0 32px 28px;
    }

    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 6px;
    }
    .form-group label .required {
      color: #ef4444;
      margin-left: 2px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s;
      outline: none;
      background: var(--bg-light);
      color: var(--text-dark);
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--primary);
      background: var(--bg-white);
      box-shadow: 0 0 0 3px rgba(86, 28, 229, 0.1);
    }
    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: var(--text-light);
    }
    .form-group textarea {
      min-height: 80px;
      resize: vertical;
    }
    .form-group select {
      appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2.5'%3E%3Cpolyline points='6 9 12 15 18 9'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 14px center;
      padding-right: 36px;
    }

    /* TWO COLUMN ROW */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    /* TAG INPUT */
    .tag-input-wrapper {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px 12px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--bg-light);
      min-height: 42px;
      align-items: center;
      transition: all 0.2s;
      cursor: text;
    }
    .tag-input-wrapper:focus-within {
      border-color: var(--primary);
      background: var(--bg-white);
      box-shadow: 0 0 0 3px rgba(86, 28, 229, 0.1);
    }
    .tag-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px 3px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      background: rgba(86, 28, 229, 0.08);
      color: var(--primary);
    }
    .tag-chip button {
      background: none;
      border: none;
      color: var(--primary-light);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0;
      display: flex;
      align-items: center;
    }
    .tag-input-wrapper input {
      border: none;
      background: none;
      outline: none;
      font-size: 13px;
      font-family: inherit;
      color: var(--text-dark);
      flex: 1;
      min-width: 80px;
      padding: 2px 0;
    }
    .tag-input-wrapper input::placeholder { color: var(--text-light); }

    .form-hint {
      font-size: 11px;
      color: var(--text-light);
      margin-top: 4px;
    }

    /* FOOTER */
    .modal-footer {
      padding: 16px 32px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    .btn-cancel {
      padding: 10px 20px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: none;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-medium);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }
    .btn-cancel:hover { border-color: var(--text-medium); color: var(--text-dark); }
    .btn-submit {
      padding: 10px 24px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(86, 28, 229, 0.3);
    }
    .btn-submit:hover {
      background: var(--primary-dark);
      box-shadow: 0 4px 12px rgba(86, 28, 229, 0.4);
    }

    /* RESPONSIVE - TABLET */
    @media (max-width: 768px) {
      body { padding: 20px; }
      .modal { border-radius: 14px; max-height: 90vh; }
      .modal-header { padding: 20px 20px 0; }
      .modal-subtitle { padding: 6px 20px 20px; }
      .form-body { padding: 0 20px 24px; }
      .form-row { grid-template-columns: 1fr; }
      .modal-footer { padding: 14px 20px; }
    }

    /* RESPONSIVE - MOBILE */
    @media (max-width: 480px) {
      body { padding: 10px; align-items: flex-start; }
      .modal { border-radius: 12px; max-height: 95vh; }
      .modal-header { padding: 16px 16px 0; }
      .modal-header h2 { font-size: 18px; }
      .modal-subtitle { padding: 6px 16px 16px; font-size: 13px; }
      .form-body { padding: 0 16px 20px; }
      .modal-footer { padding: 12px 16px; }
      .btn-cancel, .btn-submit { padding: 10px 16px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="modal">
    <div class="modal-header">
      <h2>Add Company</h2>
      <button class="btn-x">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <p class="modal-subtitle">Submit a new company to the directory for review.</p>

    <div class="form-body">
      <!-- Company Name -->
      <div class="form-group">
        <label>Company Name <span class="required">*</span></label>
        <input type="text" placeholder="e.g. DabApps">
      </div>

      <!-- Location + Industry -->
      <div class="form-row">
        <div class="form-group">
          <label>Location <span class="required">*</span></label>
          <select>
            <option value="" disabled selected>Select location</option>
            <option>Brighton</option>
            <option>London</option>
            <option>Remote</option>
            <option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Industry</label>
          <select>
            <option value="" disabled selected>Select industry</option>
            <option>Fintech</option>
            <option>EdTech</option>
            <option>Gaming</option>
            <option>SaaS</option>
            <option>Travel Tech</option>
            <option>Consulting</option>
            <option>Other</option>
          </select>
        </div>
      </div>

      <!-- Tech Stack -->
      <div class="form-group">
        <label>Tech Stack</label>
        <div class="tag-input-wrapper">
          <span class="tag-chip">React <button>&times;</button></span>
          <span class="tag-chip">Node.js <button>&times;</button></span>
          <input type="text" placeholder="Add technology...">
        </div>
        <p class="form-hint">Press Enter to add a technology</p>
      </div>

      <!-- Job Roles -->
      <div class="form-group">
        <label>Job Roles</label>
        <div class="tag-input-wrapper">
          <input type="text" placeholder="Add job role...">
        </div>
        <p class="form-hint">Press Enter to add a role</p>
      </div>

      <!-- Website + LinkedIn -->
      <div class="form-row">
        <div class="form-group">
          <label>Website URL</label>
          <input type="url" placeholder="https://...">
        </div>
        <div class="form-group">
          <label>LinkedIn URL</label>
          <input type="url" placeholder="https://linkedin.com/...">
        </div>
      </div>

      <!-- Description -->
      <div class="form-group">
        <label>Description</label>
        <textarea placeholder="Tell us about this company..."></textarea>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel">Cancel</button>
      <button class="btn-submit">Submit for Review</button>
    </div>
  </div>
</body>
</html>
