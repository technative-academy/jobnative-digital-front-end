<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobNative - Login Mockup</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #561ce5;
      --primary-light: #7e57e1;
      --primary-dark: #3d0fa8;
      --secondary: #1939e0;
      --secondary-light: #6b80fa;
      --bg-white: #ffffff;
      --bg-light: #f8f9fc;
      --text-dark: #1a1a2e;
      --text-medium: #64748b;
      --text-light: #94a3b8;
      --border: #e2e8f0;
      --shadow-lg: 0 8px 32px rgba(86, 28, 229, 0.12);
      --radius: 12px;
      --radius-lg: 16px;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-light);
      color: var(--text-dark);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* NAV */
    nav {
      background: var(--bg-white); border-bottom: 1px solid var(--border);
      padding: 0 40px; height: 64px; display: flex; align-items: center;
      justify-content: space-between;
    }
    .nav-left { display: flex; align-items: center; gap: 32px; }
    .nav-brand { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    .nav-brand span:first-child { color: var(--primary); }
    .nav-brand span:last-child { color: var(--text-dark); }
    .nav-links { display: flex; gap: 4px; }
    .nav-links a {
      text-decoration: none; color: var(--text-medium); font-size: 14px;
      font-weight: 500; padding: 8px 14px; border-radius: 8px; transition: all 0.2s;
    }
    .nav-links a:hover { color: var(--text-dark); background: var(--bg-light); }
    .nav-right { display: flex; align-items: center; gap: 8px; }
    .nav-right a {
      text-decoration: none; font-size: 14px; font-weight: 500;
      padding: 8px 16px; border-radius: 8px; transition: all 0.2s;
    }
    .nav-right a.login { color: var(--primary); }
    .nav-right a.signup {
      background: var(--primary); color: white;
    }
    .nav-right a.signup:hover { background: var(--primary-dark); }

    /* LOGIN LAYOUT */
    .login-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    .login-card {
      display: grid;
      grid-template-columns: 1fr 1fr;
      max-width: 820px;
      width: 100%;
      background: var(--bg-white);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
    }

    /* LEFT PANEL */
    .login-left {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      color: white;
      position: relative;
      overflow: hidden;
    }
    .login-left::after {
      content: '';
      position: absolute;
      top: -40%;
      right: -30%;
      width: 250px;
      height: 250px;
      background: rgba(255,255,255,0.06);
      border-radius: 50%;
    }
    .login-left::before {
      content: '';
      position: absolute;
      bottom: -20%;
      left: -20%;
      width: 200px;
      height: 200px;
      background: rgba(255,255,255,0.04);
      border-radius: 50%;
    }
    .login-left .brand {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.5px;
      opacity: 0.9;
      position: relative;
      z-index: 1;
    }
    .login-left h2 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1.2;
      margin-top: 40px;
      position: relative;
      z-index: 1;
    }
    .login-left p {
      font-size: 15px;
      opacity: 0.8;
      margin-top: 12px;
      position: relative;
      z-index: 1;
    }
    .login-left .bottom-link {
      margin-top: auto;
      padding-top: 40px;
      font-size: 14px;
      position: relative;
      z-index: 1;
    }
    .login-left .bottom-link a {
      color: white;
      font-weight: 600;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* RIGHT PANEL */
    .login-right {
      padding: 48px 40px;
    }
    .login-right h2 {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .login-right .subtitle {
      font-size: 14px;
      color: var(--text-medium);
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s;
      outline: none;
      background: var(--bg-light);
    }
    .form-group input:focus {
      border-color: var(--primary);
      background: var(--bg-white);
      box-shadow: 0 0 0 3px rgba(86, 28, 229, 0.1);
    }

    .btn-signin {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .btn-signin:hover {
      background: var(--primary-dark);
      box-shadow: 0 4px 12px rgba(86, 28, 229, 0.3);
    }

    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-medium);
    }
    .login-footer a {
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
    }
    .login-footer a:hover { text-decoration: underline; }

    @media (max-width: 768px) {
      nav { padding: 0 16px; }
      .nav-left { gap: 16px; }
      .nav-links a { padding: 6px 10px; font-size: 13px; }
      .login-wrapper { padding: 24px 16px; }
      .login-card { grid-template-columns: 1fr; }
      .login-left { display: none; }
      .login-right { padding: 32px 28px; }
    }

    /* RESPONSIVE - MOBILE */
    @media (max-width: 480px) {
      nav { padding: 0 12px; height: 56px; }
      .nav-left { gap: 10px; }
      .nav-brand { font-size: 17px; }
      .nav-links a { padding: 5px 8px; font-size: 12px; }
      .nav-right a { padding: 6px 12px; font-size: 13px; }
      .login-wrapper { padding: 16px 12px; }
      .login-right { padding: 28px 20px; }
      .login-right h2 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-left">
      <div class="nav-brand"><span>Job</span><span>Native</span></div>
      <div class="nav-links">
        <a href="homepage.html">Home</a>
        <a href="events.html">Events</a>
      </div>
    </div>
    <div class="nav-right">
      <a href="#" class="login">Log in</a>
      <a href="#" class="signup">Sign up</a>
    </div>
  </nav>

  <div class="login-wrapper">
    <div class="login-card">
      <!-- LEFT -->
      <div class="login-left">
        <div class="brand">JobNative</div>
        <div>
          <h2>Welcome back</h2>
          <p>Sign in to explore companies, events, and opportunities across Brighton's tech scene.</p>
        </div>
        <div class="bottom-link">
          Need an account? <a href="#">Create one now</a>
        </div>
      </div>

      <!-- RIGHT -->
      <div class="login-right">
        <h2>Sign in</h2>
        <p class="subtitle">Enter your email and password to continue.</p>

        <div class="form-group">
          <label>Email address</label>
          <input type="email" value="alexandramcgarryx@gmail.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" value="password123">
        </div>

        <button class="btn-signin">Sign in</button>

        <div class="login-footer">
          Need an account? <a href="#">Create one now</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
